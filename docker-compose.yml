services:

  # ════════════════════════════════════════════════════════════
  #  PostgreSQL 16 – Base de datos principal
  # ════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: transmiapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       transmiapp_db
      POSTGRES_USER:     transmi_user
      POSTGRES_PASSWORD: transmi_pass_2024
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transmi_user -d transmiapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - transmiapp_net

  # ════════════════════════════════════════════════════════════
  #  pgAdmin 4 – Interfaz web de administración
  # ════════════════════════════════════════════════════════════
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transmiapp_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL:                   admin@transmiapp.co
      PGADMIN_DEFAULT_PASSWORD:                admin2024
      PGADMIN_CONFIG_SERVER_MODE:              "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - transmiapp_net

# ════════════════════════════════════════════════════════════
#  Volúmenes nombrados
# ════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: transmiapp_postgres_data
  pgadmin_data:
    name: transmiapp_pgadmin_data

# ════════════════════════════════════════════════════════════
#  Red interna
# ════════════════════════════════════════════════════════════
networks:
  transmiapp_net:
    name: transmiapp_network
    driver: bridge
